<!DOCTYPE html>
<html lang="{{ site.lang | default: "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>{% if page.title != "首页" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/style.css" | relative_url }}?v={{ site.time | date: "%s" }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ "/feed.xml" | relative_url }}">
  <script defer data-domain="siminles.github.io" src="https://plausible.io/js/script.js"></script>
</head>
<body class="{% if site.data.darkmode == 'on' %}dark{% endif %}">
  <header class="site-header">
    <div class="container">
      <div class="header-left">
        <a href="{{ "/" | relative_url }}" class="site-title">{{ site.title }}</a>
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="petal p5"></span>
        <span class="petal p6"></span>
      </div>
      <div class="header-right">
        <nav>
          <a href="{{ "/" | relative_url }}">首页</a>
          <a href="{{ "/archive" | relative_url }}">归档</a>
          <a href="{{ "/categories" | relative_url }}">分类</a>
          <a href="{{ "/tags" | relative_url }}">标签</a>
          <a href="{{ "/search" | relative_url }}">搜索</a>
          <a href="{{ "/about" | relative_url }}">关于</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }} · 用 <a href="https://jekyllrb.com" target="_blank">Jekyll</a> 搭建 · <a href="{{ "/write/" | relative_url }}" style="color:var(--accent)">写文章</a></p>
    </div>
  </footer>

  <!-- 浮动写文章按钮 -->
  <a href="{{ "/write/" | relative_url }}" class="write-fab" title="写文章">✏️</a>

  <script>
    // 深色模式切换
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'dark') {
      html.classList.add('dark');
      toggle.textContent = '☀️';
    }
    toggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      toggle.textContent = isDark ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
