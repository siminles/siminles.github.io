<!DOCTYPE html>
<html lang="{{ site.lang | default: "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/style.css" | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ "/feed.xml" | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ "/" | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav>
        <a href="{{ "/" | relative_url }}">首页</a>
        <a href="{{ "/about" | relative_url }}">关于</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }} · 用 <a href="https://jekyllrb.com" target="_blank">Jekyll</a> 搭建</p>
    </div>
  </footer>
</body>
</html>
