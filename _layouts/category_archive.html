---
layout: default
---

<h1>分类：{{ page.title }}</h1>

<ul class="post-list">
  {% for post in page.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">
      <h2>{{ post.title }}</h2>
      <div class="post-meta">
        <time>{{ post.date | date: "%Y 年 %m 月 %d 日" }}</time>
      </div>
      {% if post.excerpt %}
      <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 150 }}</p>
      {% endif %}
    </a>
  </li>
  {% endfor %}
</ul>
