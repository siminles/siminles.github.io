---
layout: none
permalink: /write/
---
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写文章</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fafaf8;
      color: #2c2c2c;
      padding: 20px;
    }
    .container { max-width: 780px; margin: 0 auto; }
    #loginBox { max-width: 360px; margin: 80px auto; text-align: center; }
    #loginBox h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    #loginBox input {
      width: 100%; padding: 12px; font-size: 1rem;
      border: 1px solid #ddd; border-radius: 6px; margin-bottom: 0.8rem; outline: none;
    }
    #loginBox input:focus { border-color: #b85c5c; }
    #loginBox button {
      width: 100%; padding: 12px; background: #b85c5c; color: #fff;
      border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
    }
    #loginBox button:hover { background: #a04a4a; }
    #loginError { color: #b85c5c; font-size: 0.9rem; margin-bottom: 0.8rem; display: none; }
    #editorBox { display: none; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input, .toolbar select {
      padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem;
    }
    .toolbar input[type="text"] { flex: 1; min-width: 150px; }
    .tag-input { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .tag-input input { min-width: 80px; }
    .tag-item {
      background: #eee; padding: 4px 10px; border-radius: 12px;
      font-size: 0.8rem; display: inline-flex; align-items: center; gap: 4px;
    }
    .tag-item .remove { cursor: pointer; color: #b85c5c; font-weight: bold; }
    .editor-area { display: flex; gap: 16px; min-height: 500px; }
    .editor-area textarea {
      flex: 1; padding: 16px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95rem; line-height: 1.7;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      min-height: 40vh; resize: vertical; outline: none;
    }
    .editor-area textarea:focus { border-color: #b85c5c; }
    .preview-panel {
      flex: 1; padding: 16px; border: 1px solid #ddd; border-radius: 6px;
      overflow-y: auto; line-height: 1.8; font-size: 0.95rem;
    }
    .fmt-bar {
  display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;
  padding: 8px 12px; background: #f5f5f3; border: 1px solid #ddd; border-radius: 6px;
}
.fmt-bar button {
  padding: 4px 10px; background: #fff; border: 1px solid #ccc; border-radius: 4px;
  cursor: pointer; font-size: 0.85rem; line-height: 1.5; white-space: nowrap;
}
.fmt-bar button:hover { background: #e8e8e6; border-color: #b85c5c; }
.fmt-bar button.active { background: #b85c5c; color: #fff; border-color: #b85c5c; }
.fmt-bar select {
  padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 0.8rem; background: #fff; cursor: pointer;
}
.fmt-bar .sep { width: 1px; height: 20px; background: #ccc; margin: 0 2px; }
.fmt-bar .label { font-size: 0.75rem; color: #888; margin-right: 2px; }
.actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
    .actions button {
      padding: 10px 24px; border: none; border-radius: 6px;
      font-size: 0.95rem; cursor: pointer;
    }
    .btn-publish { background: #b85c5c; color: #fff; }
    .btn-publish:hover { background: #a04a4a; }
    .btn-save { background: #eee; color: #333; }
    .btn-save:hover { background: #ddd; }
    .btn-upload { background: #eee; color: #333; }
    .btn-upload:hover { background: #ddd; }
    #status { font-size: 0.85rem; color: #888; margin-top: 8px; }
    #status.success { color: #4caf50; }
    #status.error { color: #b85c5c; }
@media (max-width: 700px) { .editor-area { flex-direction: column; } .editor-area textarea { min-height: 45vh; } .preview-panel { max-height: 35vh; } }
  </style>
</head>
<body>
<div class="container">

<!-- 登录 -->
<div id="loginBox">
  <h1>✏️ 写文章</h1>
  <p style="color:#888;font-size:0.85rem;margin-bottom:1.2rem;">输入密码进入后台</p>
  <div id="loginError">密码错误</div>
  <input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="off" />
  <button onclick="handleLogin()">进入后台</button>
</div>

<!-- 编辑器 -->
<div id="editorBox">
  <div class="toolbar">
    <input type="text" id="titleInput" placeholder="文章标题" />
    <input type="text" id="dateInput" placeholder="日期 (2026-06-16)" />
    <div class="tag-input">
      <input type="text" id="catInput" placeholder="分类" list="catList" onkeydown="if(event.key==='Enter'){addTag('categories');event.preventDefault();}" />
      <datalist id="catList">
        {% for cat in site.categories %}<option value="{{ cat[0] }}">{% endfor %}
      </datalist>
      <button onclick="addTag('categories')" style="padding:8px 12px;background:#eee;border:1px solid #ddd;border-radius:4px;cursor:pointer;">+</button>
      <div id="categoryTags"></div>
    </div>
    <div class="tag-input">
      <input type="text" id="tagInput" placeholder="标签" list="tagList" onkeydown="if(event.key==='Enter'){addTag('tags');event.preventDefault();}" />
      <datalist id="tagList">
        {% for tag in site.tags %}<option value="{{ tag[0] }}">{% endfor %}
      </datalist>
      <button onclick="addTag('tags')" style="padding:8px 12px;background:#eee;border:1px solid #ddd;border-radius:4px;cursor:pointer;">+</button>
      <div id="tagTags"></div>
    </div>
  </div>
  <div class="fmt-bar" id="fmtBar">
    <button onclick="fmtWrap('**','**')" title="粗体"><b>B</b></button>
    <button onclick="fmtWrap('*','*')" title="斜体"><i>I</i></button>
    <button onclick="fmtWrap('~~','~~')" title="删除线"><s>S</s></button>
    <button onclick="fmtWrap('`','`')" title="行内代码"><code>code</code></button>
    <span class="sep"></span>
    <button onclick="fmtLine('# ')" title="标题1">H1</button>
    <button onclick="fmtLine('## ')" title="标题2">H2</button>
    <button onclick="fmtLine('### ')" title="标题3">H3</button>
    <span class="sep"></span>
    <button onclick="fmtLine('> ')" title="引用">❝</button>
    <button onclick="fmtLine('- ')" title="列表">•</button>
    <span class="sep"></span>
    <button onclick="fmtWrap('[','](url)')" title="链接">🔗</button>
    <button onclick="fmtImage()" title="插入图片">🖼</button>
    <span class="sep"></span>
    <span class="label">字号</span>
    <select onchange="fmtFontSize(this.value);this.value=''" title="字号">
      <option value="">—</option>
      <option value="12px">小</option>
      <option value="16px">中</option>
      <option value="20px">大</option>
      <option value="24px">特大</option>
    </select>
    <span class="label">字体</span>
    <select onchange="fmtFontFamily(this.value);this.value=''" title="字体">
      <option value="">—</option>
      <option value="serif">衬线</option>
      <option value="'PingFang SC',sans-serif">苹方</option>
      <option value="'Noto Serif CJK SC',serif">宋体</option>
      <option value="monospace">等宽</option>
    </select>
  </div>
  <div class="editor-area">
    <textarea id="bodyInput" placeholder="正文（Markdown）" oninput="updatePreview()"></textarea>
    <div class="preview-panel" id="previewPanel"><p style="color:#aaa;">预览区</p></div>
  </div>
  <div class="actions">
    <button class="btn-upload" onclick="document.getElementById('imageInput').click()">🖼️ 上传图片</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
    <button class="btn-save" onclick="saveDraft()">保存草稿</button>
    <button class="btn-publish" onclick="publishPost()">发布</button>
  </div>
  <div id="status"></div>
</div>

</div>

<script>
// ============ 配置 ============
const PASSWORD_HASH = 'd10c8c487752b861d784207ff29c67d40ce8a54f09c078b854c1a3a52ed3dbaa';
let GITHUB_TOKEN = localStorage.getItem('github_token') || null;
const GH_OWNER = 'siminles';
const GH_REPO = 'siminles.github.io';

let categories = [];
let tags = [];
// 跟踪已上传图片的 blob URL，用于预览（避免空白期）
let UPLOADED_BLOBS = {};
// 图片仓库：{ shortId: { blobUrl, ext } }
let UPLOADS = {};

// ============ SHA-256 ============
async function sha256(s) {
  const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ============ 登录 ============
async function handleLogin() {
  const pw = document.getElementById('passwordInput').value;
  if (await sha256(pw) === PASSWORD_HASH) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('editorBox').style.display = 'block';
    document.getElementById('loginError').style.display = 'none';
    loadDraft();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ============ Token 弹窗 ============
function showTokenDialog(callback) {
  const token = prompt('请输入 GitHub Token（首次使用需要，存在浏览器本地）');
  if (token && token.trim()) {
    localStorage.setItem('github_token', token.trim());
    GITHUB_TOKEN = token.trim();
    if (callback) callback();
  }
}

// ============ 标签 ============
function addTag(t) {
  const input = document.getElementById(t === 'categories' ? 'catInput' : 'tagInput');
  const v = input.value.trim();
  if (!v) return;
  const arr = t === 'categories' ? categories : tags;
  if (!arr.includes(v)) arr.push(v);
  input.value = '';
  renderTags(t);
}
function removeTag(t, v) {
  const arr = t === 'categories' ? categories : tags;
  const idx = arr.indexOf(v);
  if (idx > -1) arr.splice(idx, 1);
  renderTags(t);
}
function renderTags(t) {
  const el = document.getElementById(t === 'categories' ? 'categoryTags' : 'tagTags');
  const arr = t === 'categories' ? categories : tags;
  el.innerHTML = arr.map(x => `<span class="tag-item">${x} <span class="remove" onclick="removeTag('${t}','${x}')">×</span></span>`).join('');
}

// ============ 预览 ============
function updatePreview() {
  const body = document.getElementById('bodyInput').value;
  const pv = document.getElementById('previewPanel');
  let h = body
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // 展开 ⏏ 标记为预览图
    h = h.replace(/⏏(\w{6})/g, (match, sid) => {
      const u = UPLOADS[sid];
      return u ? `<img src="${u.blobUrl}" style="max-width:100%">` : match;
    });
    // 标准 markdown 图片语法
    h = h.replace(/!\[(.+?)\]\((.+?)\)/g, (match, alt, src) => {
      const realSrc = UPLOADED_BLOBS[src] || src;
      return `<img src="${realSrc}" alt="${alt}" style="max-width:100%">`;
    })
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
  pv.innerHTML = body.trim() ? '<p>' + h + '</p>' : '<p style="color:#aaa;">预览区</p>';
}

// ============ 草稿 ============
function saveDraft() {
  try {
    localStorage.setItem('blog_draft', JSON.stringify({
      title: document.getElementById('titleInput').value,
      date: document.getElementById('dateInput').value,
      categories, tags,
      body: document.getElementById('bodyInput').value
    }));
    setStatus('草稿已保存', 'success');
  } catch(e) {
    setStatus('草稿保存失败：存储空间不足', 'error');
  }
}
function loadDraft() {
  try {
    const d = JSON.parse(localStorage.getItem('blog_draft') || '{}');
    document.getElementById('titleInput').value = d.title || '';
    document.getElementById('dateInput').value = d.date || '';
    document.getElementById('bodyInput').value = d.body || '';
    categories = d.categories || [];
    tags = d.tags || [];
    renderTags('categories'); renderTags('tags');
    updatePreview();
  } catch(e) {}
}

// ============ 封装 XHR Promise ============
function ghRequest(method, path, body) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
    xhr.open(method, url, true);
    xhr.setRequestHeader('Authorization', 'Bearer ' + GITHUB_TOKEN);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('User-Agent', 'simin-blog/1.0');
    xhr.timeout = 45000;
    xhr.onload = () => {
      try {
        resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, data: JSON.parse(xhr.responseText) });
      } catch(e) {
        resolve({ ok: false, status: xhr.status, data: { message: '响应解析失败' } });
      }
    };
    xhr.onerror = () => reject(new Error('网络请求失败'));
    xhr.ontimeout = () => reject(new Error('请求超时'));
    xhr.send(JSON.stringify(body));
  });
}

// ============ Canvas 图片压缩 ============
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 2000;
      let w = img.width, h = img.height;
      if (Math.max(w, h) > MAX) {
        const s = MAX / Math.max(w, h);
        w = Math.round(w * s); h = Math.round(h * s);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      // 二分查找合适的质量值，目标 <500KB
      let lo = 0.4, hi = 0.95, best = null;
      for (let i = 0; i < 6; i++) {
        const q = (lo + hi) / 2;
        const b64 = canvas.toDataURL('image/jpeg', q).split(',')[1];
        const bytes = b64.length * 0.75; // base64 → binary
        if (bytes < 500 * 1024) { best = b64; lo = q; }
        else { hi = q; }
      }
      if (!best) best = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];
      resolve({ base64: best, ext: 'jpg', origKB: Math.round(file.size/1024), newKB: Math.round(best.length*0.75/1024) });
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = url;
  });
}

// ============ 图片上传（XHR 方式）============
async function uploadImage(input) {
  const file = input.files[0];
  if (!file) { input.value = ''; return; }

  if (file.size > 30 * 1024 * 1024) {
    setStatus('图片太大，请控制在 30MB 以内', 'error');
    input.value = '';
    return;
  }

  setStatus('正在压缩图片...', '');

  try {
    const compressed = await compressImage(file);

    const shortId = Math.random().toString(36).slice(2, 8);
    const ext = 'jpg'; // 压缩后统一 JPG

    // 只在文本框插入 ⏏ 标记，不上传
    const marker = `⏏${shortId}`;
    const ta = document.getElementById('bodyInput');
    const pos = ta.selectionStart;
    ta.value = ta.value.slice(0, pos) + marker + '\n' + ta.value.slice(pos);
    UPLOADS[shortId] = {
      base64: compressed.base64,
      ext: ext
    };
    updatePreview();
    setStatus(`✅ 已压缩 ${compressed.origKB}KB → ${compressed.newKB}KB（发布时才上传）`, 'success');
  } catch(err) {
    setStatus('读取失败: ' + err.message, 'error');
  }
  input.value = '';
}

// ============ 发布（XHR 方式）============
async function publishPost() {
  const title = document.getElementById('titleInput').value.trim();
  const body = document.getElementById('bodyInput').value.trim();
  if (!title || !body) { setStatus('标题和正文不能为空', 'error'); return; }
  if (!GITHUB_TOKEN) { showTokenDialog(() => publishPost()); return; }

  // 先上传所有未上传的图片
  const toUpload = Object.keys(UPLOADS).filter(sid => UPLOADS[sid].base64 && !UPLOADS[sid].uploaded);
  if (toUpload.length > 0) {
    setStatus(`正在上传 ${toUpload.length} 张图片...`, '');
    for (const sid of toUpload) {
      const u = UPLOADS[sid];
      const path = `u/${sid}.${u.ext}`;
      try {
        const r = await ghRequest('PUT', path, { message: `upload ${path}`, content: u.base64 });
        if (r.ok) { u.uploaded = true; delete u.base64; /* 清掉 base64 释放内存 */ }
        else { setStatus('图片上传失败: ' + (r.data && r.data.message || '未知'), 'error'); return; }
      } catch(e) { setStatus('图片上传出错: ' + e.message, 'error'); return; }
    }
    setStatus('图片已上传，正在发布...', '');
  }

  const dateStr = document.getElementById('dateInput').value.trim()
    || (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  const slug = title.replace(/[^\w\u4e00-\u9fa5\s-]/g, '').replace(/\s+/g, '-').toLowerCase().slice(0, 50) || 'untitled';
  // 展开 ⏏xxxxxx → ![图](/u/xxxxxx.jpg)
  let cookedBody = body.replace(/⏏(\w{6})/g, (match, sid) => {
    const u = UPLOADS[sid];
    return u ? `![图](/u/${sid}.${u.ext})` : match;
  });
  const cats = categories.length ? '\ncategories: [' + categories.map(c => `"${c}"`).join(', ') + ']' : '';
  const tgs = tags.length ? '\ntags: [' + tags.map(t => `"${t}"`).join(', ') + ']' : '';
  const content = `---\nlayout: post\ntitle: "${title}"\ndate: ${dateStr} 12:00:00 +0800${cats}${tgs}\n---\n\n${cookedBody}\n`;

  const filename = `_posts/${dateStr}-${slug}.md`;
  // 用 TextEncoder 做 UTF-8 → Base64（替代已废弃的 unescape）
  const bytes = new TextEncoder().encode(content);
  let binary = ''; for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const base64 = btoa(binary);

  setStatus('正在发布...', '');

  try {
    const result = await ghRequest('PUT', filename, { message: `新文章: ${title}`, content: base64 });

    if (result.ok) {
      setStatus('✅ 发布成功！1-2 分钟后可见', 'success');
      localStorage.removeItem('blog_draft');
      document.getElementById('titleInput').value = '';
      document.getElementById('bodyInput').value = '';
      categories = []; tags = []; UPLOADS = {};
      renderTags('categories'); renderTags('tags');
    } else {
      const msg = result.data && result.data.message || '';
      if (result.status === 401 || result.status === 403 || msg.includes('token')) {
        localStorage.removeItem('github_token');
        GITHUB_TOKEN = null;
        setStatus('Token 无效，请重新设置', 'error');
      } else {
        setStatus('发布失败: ' + msg, 'error');
      }
    }
  } catch(err) {
    setStatus('发布出错: ' + err.message, 'error');
  }
}

// ============ 格式工具栏 ============
function getTextarea() { return document.getElementById('bodyInput'); }

// 获取选区或光标位置
function getSel() {
  const ta = getTextarea();
  return { start: ta.selectionStart, end: ta.selectionEnd, text: ta.value.slice(ta.selectionStart, ta.selectionEnd) };
}

// 替换选区内容
function replaceSel(start, end, text) {
  const ta = getTextarea();
  ta.value = ta.value.slice(0, start) + text + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();
  updatePreview();
}

// 包裹选区：在前后加标记
function fmtWrap(before, after) {
  const s = getSel();
  const txt = s.text || before === after ? '' : '文本';
  if (txt) {
    replaceSel(s.start, s.end, before + txt + after);
  } else {
    replaceSel(s.start, s.end, before + after);
  }
}

// 在行首插入前缀
function fmtLine(prefix) {
  const ta = getTextarea();
  const start = ta.selectionStart;
  // 找到当前行开头
  const lines = ta.value.slice(0, start).split('\n');
  const lineStart = start - lines[lines.length-1].length;
  ta.value = ta.value.slice(0, lineStart) + prefix + ta.value.slice(lineStart);
  ta.selectionStart = ta.selectionEnd = lineStart + prefix.length;
  ta.focus();
  updatePreview();
}

// 字号：用 HTML span
function fmtFontSize(size) {
  const s = getSel();
  const txt = s.text || '文字';
  replaceSel(s.start, s.end, `<span style="font-size:${size}">${txt}</span>`);
}

// 字体：用 HTML span
function fmtFontFamily(family) {
  const s = getSel();
  const txt = s.text || '文字';
  replaceSel(s.start, s.end, `<span style="font-family:${family}">${txt}</span>`);
}

// 插入图片标记
function fmtImage() {
  const s = getSel();
  replaceSel(s.start, s.end, `![图片描述](图片URL)`);
}

function setStatus(text, type) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = type || '';
}
</script>
</body>
</html>
