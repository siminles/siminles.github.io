<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写文章</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fafaf8; color: #2c2c2c; padding: 20px;
    }
    .container { max-width: 820px; margin: 0 auto; }
    #loginBox { max-width: 360px; margin: 80px auto; text-align: center; }
    #loginBox h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    #loginBox input {
      width: 100%; padding: 12px; font-size: 1rem;
      border: 1px solid #ddd; border-radius: 6px; margin-bottom: 0.8rem; outline: none;
    }
    #loginBox input:focus { border-color: #b85c5c; }
    #loginBox button {
      width: 100%; padding: 12px; background: #b85c5c; color: #fff;
      border: none; border-radius: 6px; font-size: 1rem; cursor: pointer;
    }

<div class="container">

      <button onclick="addTag('categories')" style="padding:8px 12px;background:#eee;border:1px solid #ddd;border-radius:4px;cursor:pointer;">+</button>

    </div>
    <div class="tag-input">

      <datalist id="tagList">
        {% for tag in site.tags %}<option value="{{ tag[0] }}">{% endfor %}
      </datalist>
      <button onclick="addTag('tags')" style="padding:8px 12px;background:#eee;border:1px solid #ddd;border-radius:4px;cursor:pointer;">+</button>
      <div id="tagTags"></div>
    </div>
  </div>

  <div class="editor-container">
    <div class="fmt-bar">
      <button onclick="exec('bold')" title="粗体"><b>B</b></button>
      <button onclick="exec('italic')" title="斜体"><i>I</i></button>
      <button onclick="exec('underline')" title="下划线"><u>U</u></button>
      <button onclick="exec('strikeThrough')" title="删除线"><s>S</s></button>
      <span class="sep"></span>
      <button onclick="execFormat('h1')" title="标题1">H1</button>
      <button onclick="execFormat('h2')" title="标题2">H2</button>
      <button onclick="execFormat('h3')" title="标题3">H3</button>
      <span class="sep"></span>
      <button onclick="exec('insertUnorderedList')" title="无序列表">•</button>
      <button onclick="exec('insertOrderedList')" title="有序列表">1.</button>
      <button onclick="exec('formatBlock','blockquote')" title="引用">❝</button>

      <span class="sep"></span>

        <div class="emoji-picker" id="emojiPicker"></div>
      </span>

        <option value="">字号</option>
        <option value="14px">小(14)</option>
        <option value="16px">中(16)</option>
        <option value="20px">大(20)</option>
        <option value="24px">特大(24)</option>
        <option value="30px">超大(30)</option>
      </select>

        <option value="">字体</option>
        <option value="'PingFang SC','Microsoft YaHei',sans-serif">默认</option>
        <option value="'Noto Serif CJK SC','SimSun',serif">宋体</option>

<script>
// ============ 配置 ============
const PASSWORD_HASH = 'd10c8c487752b861d784207ff29c67d40ce8a54f09c078b854c1a3a52ed3dbaa';
let GITHUB_TOKEN = localStorage.getItem('github_token') || null;
const GH_OWNER = 'siminles';
const GH_REPO = 'siminles.github.io';

let categories = [];
let tags = [];
let UPLOADED_BLOBS = {};
let UPLOADS = {};
let editMode = false;
let editFilePath = null;
let editFileSha = null;

// ============ SHA-256 ============
async function sha256(s) {
  const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ============ 登录 ============
async function handleLogin() {
  const pw = document.getElementById('passwordInput').value;
  if (await sha256(pw) === PASSWORD_HASH) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('editorBox').style.display = 'block';
    document.getElementById('loginError').style.display = 'none';
    loadDraft();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ============ Token 弹窗 ============
function showTokenDialog(callback) {
  const token = prompt('请输入 GitHub Token（首次使用需要，存在浏览器本地）');
  if (token && token.trim()) {
    localStorage.setItem('github_token', token.trim());
    GITHUB_TOKEN = token.trim();
    if (callback) callback();
  }
}

// ============ 标签 ============
function addTag(t) {
  const input = document.getElementById(t === 'categories' ? 'catInput' : 'tagInput');
  const v = input.value.trim();
  if (!v) return;
  const arr = t === 'categories' ? categories : tags;
  if (!arr.includes(v)) arr.push(v);
  input.value = '';
  renderTags(t);
}
function removeTag(t, v) {
  const arr = t === 'categories' ? categories : tags;
  const idx = arr.indexOf(v);
  if (idx > -1) arr.splice(idx, 1);
  renderTags(t);
}
function renderTags(t) {
  const el = document.getElementById(t === 'categories' ? 'categoryTags' : 'tagTags');
  const arr = t === 'categories' ? categories : tags;
  el.innerHTML = arr.map(x => `<span class="tag-item">${x} <span class="remove" onclick="removeTag('${t}','${x}')">×</span></span>`).join('');
}

// ============ 编辑器命令 ============
let savedRange = null;

// 编辑器失焦前保存选区（点下拉框会触发 blur）
document.getElementById('editor').addEventListener('blur', () => {
  const sel = window.getSelection();
  if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
});

// 工具栏 mousedown 也保存一次（兼容不同浏览器时序）
document.querySelector('.fmt-bar').addEventListener('mousedown', (e) => {
  const sel = window.getSelection();
  if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
});

function exec(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('editor').focus();
}

function execFormat(tag) {
  document.execCommand('formatBlock', false, tag);
  document.getElementById('editor').focus();
}

function applyFontSize(size) {
  wrapSelection('span', { 'font-size': size });
}

function applyFontFamily(family) {
  wrapSelection('span', { 'font-family': family });
}

function wrapSelection(tagName, styles) {
  // 恢复之前保存的选区（如果有点击了工具栏dropdown）
  if (savedRange) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
    savedRange = null;
  }
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const editor = document.getElementById('editor');

  // 没选中文字时不做任何事
  if (range.collapsed) { editor.focus(); return; }

  if (range.commonAncestorContainer === editor ||
             editor.contains(range.commonAncestorContainer)) {
    // Selection inside editor: wrap with span
    // First try surroundContents (works for simple text nodes)
    try {
      const span = document.createElement(tagName);
      Object.assign(span.style, styles);
      range.surroundContents(span);
    } catch(e) {
      // Complex selection: extract content, wrap, reinsert
      const fragment = range.extractContents();
      const span = document.createElement(tagName);
      Object.assign(span.style, styles);
      span.appendChild(fragment);
      range.insertNode(span);
    }
  }
  editor.focus();
}

function insertLink() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const url = prompt('链接地址:', 'https://');
  if (!url) return;
  const range = sel.getRangeAt(0);
  const text = range.collapsed ? url : range.toString();
  const a = document.createElement('a');
  a.href = url;
  a.textContent = text;
  a.target = '_blank';
  if (range.collapsed) {
    range.insertNode(a);
    sel.selectAllChildren(a);
  } else {
    try { range.surroundContents(a); } catch(e) {
      const frag = range.extractContents();
      a.appendChild(frag);
      range.insertNode(a);
    }
  }
  document.getElementById('editor').focus();
}

// ============ 表情选择器 ============
const EMOJI_LIST = [
  '😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😉','😌','😍','🥰','😘','😗','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🥴','😵','🤯','🥳','😎','🤓','🧐','😟','😕','🙁','😮','😯','😲','😳','🥺','😢','😭','😤','😡','🤬','😈','💀','☠️','👻','👽','🤖','💩',
  '👍','👎','👏','🙌','🤝','💪','👋','🤞','✌️','🤟','👌','🤏','✊','👊','🤛','🤜','🖖','🤘','🖐️','✋','☝️','👇','👆','👉','👈',
  '❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝','💟',
  '⭐','🌟','✨','💫','🔥','💥','💯','💢','💦','💤','🕳️',
  '🌸','🌺','🌻','🌹','🌷','🌼','💐','🥀','🍀','🌿','🌱','🌵','🌴','🌳','🌲','🍂','🍁','🌾',
  '🎀','🎁','🎂','🎈','🎉','🎊','🎃','🎄','🎋','🎑','🧧','🎗️','🎟️',
  '☕','🍵','🍰','🍦','🍩','🍪','🍫','🍬','🍭','🍡','🍧','🍨','🧁','🥤','🧃',
  '🐱','🐶','🐰','🐻','🐼','🐨','🐯','🦊','🐮','🐷','🐸','🐵','🐔','🐤','🐦','🦄','🐙','🦋','🐞','🐝',
  '📝','✏️','📌','📍','📎','🖇️','📖','📚','📓','📔','📒','📕','📗','📘','📙',
  '💻','📱','⌨️','🖥️','🖱️','🎧','📷','📸','🎬','🎤','🎵','🎶','📺','⏰','💡','🔦','💰','💎','🔑','🛒',
  '💬','🗨️','🗯️','💭','📢','📣','🔔','🔕',
  '✅','❌','⭕','❓','❗','💢','♨️','〽️','⚠️','🚫','🔞','⬆️','⬇️','➡️','⬅️','↗️','↘️','↙️','↖️','🔄','🔃'
];

function buildEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = EMOJI_LIST.map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');
}

function toggleEmoji() {
  const picker = document.getElementById('emojiPicker');
  if (!picker.children.length) buildEmojiPicker();
  picker.classList.toggle('open');
  document.getElementById('editor').focus();
}

function insertEmoji(emoji) {
  const ed = document.getElementById('editor');
  ed.focus();
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(document.createTextNode(emoji));
    range.collapse(false);
  }
  document.getElementById('emojiPicker').classList.remove('open');
}

// 点击其他地方关闭表情面板
document.addEventListener('click', (e) => {
  const picker = document.getElementById('emojiPicker');
  if (!picker) return;
  const btn = document.querySelector('.emoji-btn');
  if (!picker.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    picker.classList.remove('open');
  }
});

// ============ 草稿 ============
function saveDraft() {
  try {
    const ed = document.getElementById('editor');
    localStorage.setItem('blog_draft_v2', JSON.stringify({
      title: document.getElementById('titleInput').value,
      date: document.getElementById('dateInput').value,
      categories, tags,
      html: ed.innerHTML
    }));
    setStatus('草稿已保存', 'success');
  } catch(e) {
    setStatus('草稿保存失败', 'error');
  }
}
function loadDraft() {
  try {
    const d = JSON.parse(localStorage.getItem('blog_draft_v2') || '{}');
    document.getElementById('titleInput').value = d.title || '';
    document.getElementById('dateInput').value = d.date || '';
    categories = d.categories || [];
    tags = d.tags || [];
    renderTags('categories'); renderTags('tags');
    if (d.html) document.getElementById('editor').innerHTML = d.html;
  } catch(e) {}
}

// ============ 云端草稿同步 ============
const DRAFT_PATH = 'blog-draft.json';

async function syncCloud() {
  if (!GITHUB_TOKEN) { showTokenDialog(() => syncCloud()); return; }
  const ed = document.getElementById('editor');
  const draft = {
    title: document.getElementById('titleInput').value,
    date: document.getElementById('dateInput').value,
    categories, tags,
    html: ed.innerHTML,
    updatedAt: new Date().toISOString()
  };
  setStatus('正在同步到云端...', '');
  try {
    // 先检查远程文件是否存在
    let sha = null;
    try {
      const check = await ghRequest('GET', DRAFT_PATH);
      if (check.ok && check.data && check.data.sha) sha = check.data.sha;
    } catch(e) {}
    const body = { message: '同步草稿', content: btoa(unescape(encodeURIComponent(JSON.stringify(draft)))) };
    if (sha) body.sha = sha;
    const r = await ghRequest('PUT', DRAFT_PATH, body);
    if (r.ok) {
      setStatus('☁️ 草稿已同步到云端，任何设备都能加载', 'success');
    } else {
      setStatus('同步失败: ' + (r.data && r.data.message || '未知'), 'error');
    }
  } catch(e) { setStatus('同步出错: ' + e.message, 'error'); }
}

async function loadCloud() {
  if (!GITHUB_TOKEN) { showTokenDialog(() => loadCloud()); return; }
  setStatus('正在加载云端草稿...', '');
  try {
    const r = await ghRequest('GET', DRAFT_PATH);
    if (r.ok && r.data && r.data.content) {
      const json = JSON.parse(decodeURIComponent(escape(atob(r.data.content))));
      document.getElementById('titleInput').value = json.title || '';
      document.getElementById('dateInput').value = json.date || '';
      categories = json.categories || [];
      tags = json.tags || [];
      renderTags('categories'); renderTags('tags');
      if (json.html) document.getElementById('editor').innerHTML = json.html;
      // 同时保存到本地
      saveDraft();
      const updated = json.updatedAt ? ' (' + new Date(json.updatedAt).toLocaleString('zh-CN') + ')' : '';
      setStatus('⬇️ 云端草稿已加载' + updated, 'success');
    } else if (r.status === 404) {
      setStatus('云端还没有草稿，先点「☁️ 同步」上传一份', '');
    } else {
      setStatus('加载失败: ' + (r.data && r.data.message || '未知'), 'error');
    }
  } catch(e) { setStatus('加载出错: ' + e.message, 'error'); }
}

// ============ 封装 XHR Promise ============
function ghRequest(method, path, body) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
    xhr.open(method, url, true);
    xhr.setRequestHeader('Authorization', 'Bearer ' + GITHUB_TOKEN);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('User-Agent', 'simin-blog/1.0');
    xhr.timeout = 45000;
    xhr.onload = () => {
      try { resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, data: JSON.parse(xhr.responseText) }); }
      catch(e) { resolve({ ok: false, status: xhr.status, data: { message: '响应解析失败' } }); }
    };
    xhr.onerror = () => reject(new Error('网络请求失败'));
    xhr.ontimeout = () => reject(new Error('请求超时'));
    xhr.send(JSON.stringify(body));
  });
}

// ============ Canvas 图片压缩 ============
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 2000;
      let w = img.width, h = img.height;
      if (Math.max(w, h) > MAX) { const s = MAX / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      let lo = 0.4, hi = 0.95, best = null;
      for (let i = 0; i < 6; i++) {
        const q = (lo + hi) / 2;
        const b64 = canvas.toDataURL('image/jpeg', q).split(',')[1];
        const bytes = b64.length * 0.75;
        if (bytes < 500 * 1024) { best = b64; lo = q; } else { hi = q; }
      }
      if (!best) best = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];
      resolve({ base64: best, ext: 'jpg', origKB: Math.round(file.size/1024), newKB: Math.round(best.length*0.75/1024) });
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = url;
  });
}

// ============ 图片上传 ============
async function uploadImage(input) {
  const file = input.files[0];
  if (!file) { input.value = ''; return; }
  if (file.size > 30 * 1024 * 1024) { setStatus('图片太大，请控制在 30MB 以内', 'error'); input.value = ''; return; }
  setStatus('正在压缩图片...', '');
  try {
    const compressed = await compressImage(file);
    const shortId = Math.random().toString(36).slice(2, 8);
    // 在编辑器插入图片
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file); // 临时预览
    img.alt = '图';
    img.dataset.uploadId = shortId;
    const ed = document.getElementById('editor');
    ed.appendChild(img);
    ed.focus();
    UPLOADS[shortId] = { base64: compressed.base64, ext: 'jpg' };
    setStatus(`✅ 已压缩 ${compressed.origKB}KB → ${compressed.newKB}KB（发布时才上传）`, 'success');
  } catch(err) { setStatus('读取失败: ' + err.message, 'error'); }
  input.value = '';
}

// ============ HTML → Markdown 转换 ============
function htmlToMarkdown(element) {
  if (!element) return '';
  let md = '';
  element.childNodes.forEach(node => {
    if (node.nodeType === 3) { // Text node
      md += node.textContent;
    } else if (node.nodeType === 1) { // Element node
      const tag = node.nodeName.toLowerCase();
      switch (tag) {
        case 'br': md += '\n'; break;
        case 'strong': case 'b': {
          const t = htmlToMarkdown(node);
          md += t.trim() ? '**' + t + '**' : t;
          break;
        }
        case 'em': case 'i': {
          const t = htmlToMarkdown(node);
          md += t.trim() ? '*' + t + '*' : t;
          break;
        }
        case 'u':
          md += '<u>' + htmlToMarkdown(node) + '</u>'; break;
        case 'del': case 's': case 'strike': {
          const t = htmlToMarkdown(node);
          md += t.trim() ? '~~' + t + '~~' : t;
          break;
        }
        case 'h1': md += '# ' + htmlToMarkdown(node) + '\n\n'; break;
        case 'h2': md += '## ' + htmlToMarkdown(node) + '\n\n'; break;
        case 'h3': md += '### ' + htmlToMarkdown(node) + '\n\n'; break;
        case 'h4': md += '#### ' + htmlToMarkdown(node) + '\n\n'; break;
        case 'a':
          md += '[' + htmlToMarkdown(node) + '](' + (node.getAttribute('href') || '#') + ')'; break;
        case 'img':
          const src = node.dataset.uploadId
            ? `⏏${node.dataset.uploadId}`
            : (node.getAttribute('src') || '');
          md += `![${node.getAttribute('alt') || '图'}](${src})\n`; break;
        case 'span':
          const style = node.getAttribute('style') || '';
          if (style) {
            md += '<span' + (style ? ' style="' + style + '"' : '') + '>' + htmlToMarkdown(node) + '</span>';
          } else {
            md += htmlToMarkdown(node);
          }
          break;
        case 'blockquote':
          const quoteLines = htmlToMarkdown(node).trim().split('\n');
          md += quoteLines.map(l => '> ' + l).join('\n') + '\n\n';
          break;
        case 'ul': md += htmlToMarkdown(node) + '\n\n'; break;
        case 'ol': md += htmlToMarkdown(node) + '\n\n'; break;
        case 'li':
          const parent = node.parentNode ? node.parentNode.nodeName.toLowerCase() : '';
          const prefix = parent === 'ol' ? '1. ' : '- ';
          md += prefix + htmlToMarkdown(node).replace(/\n/g, ' ') + '\n';
          break;
        case 'p':
          md += htmlToMarkdown(node) + '\n\n';
          break;
        case 'div':
          md += htmlToMarkdown(node) + '\n\n';
          break;
        case 'code':
          if (node.parentNode && node.parentNode.nodeName.toLowerCase() === 'pre') {
            md += '```\n' + node.textContent + '\n```\n\n';
          } else {
            md += '`' + htmlToMarkdown(node) + '`';
          }
          break;
        case 'pre':
          md += htmlToMarkdown(node) + '\n\n';
          break;
        default:
          md += htmlToMarkdown(node);
      }
    }
  });
  return md;
}

// ============ 编辑文章 ============
async function togglePostList() {
  const panel = document.getElementById('postEditPanel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }
  if (!GITHUB_TOKEN) { showTokenDialog(() => togglePostList()); return; }
  panel.innerHTML = '<div style="padding:14px;color:#999;">加载中...</div>';
  panel.classList.add('open');
  try {
    const r = await ghRequest('GET', '_posts/');
    if (r.ok && r.data) {
      const items = Array.isArray(r.data) ? r.data : [];
      items.sort((a, b) => b.name.localeCompare(a.name)); // 最新在上
      panel.innerHTML = items.length
        ? items.map(f => `<div class="post-edit-item" onclick="loadPostForEdit('${f.path}','${f.sha}')">
          <span class="post-title">${f.name.replace('.md','').replace(/^\d{4}-\d{2}-\d{2}-/,'')}</span>
          <span class="post-date">${f.name.slice(0,10)}</span>
        </div>`).join('')
        : '<div style="padding:14px;color:#999;">暂无可编辑的文章</div>';
    } else {
      panel.innerHTML = '<div style="padding:14px;color:#e65100;">加载失败</div>';
    }
  } catch(e) {
    panel.innerHTML = '<div style="padding:14px;color:#e65100;">加载出错: ' + e.message + '</div>';
  }
}

async function loadPostForEdit(path, sha) {
  if (!GITHUB_TOKEN) { showTokenDialog(() => loadPostForEdit(path, sha)); return; }
  setStatus('正在加载文章...', '');
  try {
    const r = await ghRequest('GET', path);
    if (!r.ok || !r.data || !r.data.content) {
      setStatus('加载文章失败', 'error');
      return;
    }
    const raw = decodeURIComponent(escape(atob(r.data.content)));
    // 解析 YAML frontmatter
    const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    if (!fmMatch) { setStatus('文章格式异常', 'error'); return; }
    
    const fm = fmMatch[1];
    const body = fmMatch[2];
    
    // 简单解析 frontmatter
    const titleMatch = fm.match(/title:\s*["']?(.+?)["']?\s*$/m);
    const dateMatch = fm.match(/date:\s*(\d{4}-\d{2}-\d{2})/);
    const catsMatch = fm.match(/categories:\s*\[(.+?)\]/s);
    const tagsMatch = fm.match(/tags:\s*\[(.+?)\]/s);
    
    document.getElementById('titleInput').value = titleMatch ? titleMatch[1] : '';
    document.getElementById('dateInput').value = dateMatch ? dateMatch[1] : '';
    
    // 解析 categories
    categories = [];
    if (catsMatch) {
      const rawCats = catsMatch[1];
      const catRe = /["']([^"']+)["']/g;
      let m;
      while ((m = catRe.exec(rawCats)) !== null) categories.push(m[1]);
    }
    
    // 解析 tags
    tags = [];
    if (tagsMatch) {
      const rawTags = tagsMatch[1];
      const tagRe = /["']([^"']+)["']/g;
      let m;
      while ((m = tagRe.exec(rawTags)) !== null) tags.push(m[1]);
    }
    
    renderTags('categories'); renderTags('tags');
    
    // 简单 Markdown → HTML 转换
    let html = body
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/!\[(.*?)\]\((.+?)\)/g, '<img src="$2" alt="$1">')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^\- (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/\n{2,}/g, '</p><p>')
      .replace(/\n/g, '<br>');
    
    if (html.trim()) html = '<p>' + html + '</p>';
    document.getElementById('editor').innerHTML = html;
    
    // 进入编辑模式
    editMode = true;
    editFilePath = path;
    editFileSha = r.data.sha;
    document.getElementById('editBanner').classList.add('active');
    document.getElementById('editPostName').textContent = titleMatch ? titleMatch[1] : path;
    document.getElementById('postEditPanel').classList.remove('open');
    setStatus('✅ 已载入，修改后点「发布」即可更新', 'success');
  } catch(e) {
    setStatus('加载出错: ' + e.message, 'error');
  }
}

function cancelEdit() {
  editMode = false;
  editFilePath = null;
  editFileSha = null;
  document.getElementById('editBanner').classList.remove('active');
  document.getElementById('titleInput').value = '';
  document.getElementById('dateInput').value = '';
  document.getElementById('editor').innerHTML = '';
  categories = []; tags = []; UPLOADS = {};
  renderTags('categories'); renderTags('tags');
  setStatus('已取消编辑', '');
}

// ============ 发布 ============
async function publishPost() {
  const title = document.getElementById('titleInput').value.trim();
  if (!title) { setStatus('标题不能为空', 'error'); return; }
  if (!GITHUB_TOKEN) { showTokenDialog(() => publishPost()); return; }

  const editor = document.getElementById('editor');
  const html = editor.innerHTML;

  // 先上传所有未上传的图片
  const toUpload = Object.keys(UPLOADS).filter(sid => UPLOADS[sid].base64 && !UPLOADS[sid].uploaded);
  if (toUpload.length > 0) {
    setStatus(`正在上传 ${toUpload.length} 张图片...`, '');
    for (const sid of toUpload) {
      const u = UPLOADS[sid];
      const path = `u/${sid}.${u.ext}`;
      try {
        const r = await ghRequest('PUT', path, { message: `upload ${path}`, content: u.base64 });
        if (r.ok) { u.uploaded = true; delete u.base64; }
        else { setStatus('图片上传失败: ' + (r.data && r.data.message || '未知'), 'error'); return; }
      } catch(e) { setStatus('图片上传出错: ' + e.message, 'error'); return; }
    }
    setStatus('图片已上传，正在发布...', '');
  }

  // 转换为 Markdown
  let body = htmlToMarkdown(editor).replace(/[\u200B\x00]/g, '');

  // 展开 ⏏ 标记
  body = body.replace(/⏏(\w{6})/g, (match, sid) => {
    const u = UPLOADS[sid];
    return u ? `![图](/u/${sid}.${u.ext})` : match;
  });

  const dateStr = document.getElementById('dateInput').value.trim()
    || (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  const slug = title.replace(/[^\w\u4e00-\u9fa5\s-]/g, '').replace(/\s+/g, '-').toLowerCase().slice(0, 50) || 'untitled';
  const cats = categories.length ? '\ncategories: [' + categories.map(c => `"${c}"`).join(', ') + ']' : '';
  const tgs = tags.length ? '\ntags: [' + tags.map(t => `"${t}"`).join(', ') + ']' : '';
  const content = `---\nlayout: post\ntitle: "${title}"\ndate: ${dateStr} 12:00:00 +0800${cats}${tgs}\n---\n\n${body}\n`;

  const filename = editMode ? editFilePath : `_posts/${dateStr}-${slug}.md`;
  const bytes = new TextEncoder().encode(content);
  let binary = ''; for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const base64 = btoa(binary);

  const commitMsg = editMode ? `更新文章: ${title}` : `新文章: ${title}`;
  const putBody = { message: commitMsg, content: base64 };
  if (editMode && editFileSha) putBody.sha = editFileSha;

  setStatus(editMode ? '正在更新...' : '正在发布...', '');
  try {
    const result = await ghRequest('PUT', filename, putBody);
    if (result.ok) {
      setStatus(editMode ? '✅ 更新成功！1-2 分钟后可见' : '✅ 发布成功！1-2 分钟后可见', 'success');
      localStorage.removeItem('blog_draft_v2');
      document.getElementById('titleInput').value = '';
      document.getElementById('dateInput').value = '';
      editor.innerHTML = '';
      categories = []; tags = []; UPLOADS = {}; editMode = false; editFilePath = null; editFileSha = null;
      document.getElementById('editBanner').classList.remove('active');
      renderTags('categories'); renderTags('tags');
    } else {
      const msg = result.data && result.data.message || '';
      if (result.status === 401 || result.status === 403 || msg.includes('token')) {
        localStorage.removeItem('github_token'); GITHUB_TOKEN = null;
        setStatus('Token 无效，请重新设置', 'error');
      } else { setStatus('发布失败: ' + msg, 'error'); }
    }
  } catch(err) { setStatus('发布出错: ' + err.message, 'error'); }
}

function setStatus(text, type) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = type || '';
}

// ============ 自动保存 ============
let autoSaveTimer;
document.getElementById('editor').addEventListener('input', () => {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveDraft, 2000);
});

// 初始化焦点处理
document.addEventListener('click', (e) => {
  const ed = document.getElementById('editor');
  if (ed && ed === document.activeElement) return;
});

// 粘贴时只保留纯文本，避免格式污染
document.getElementById('editor').addEventListener('paste', (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  document.execCommand('insertText', false, text);
});
