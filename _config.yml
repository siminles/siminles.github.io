title: Simin的小角落
description: 记录一些细碎的、温柔的、真实的东西
author: simin
lang: zh-CN

# 主题设置
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives

# 构建
permalink: /:year/:month/:title/
markdown: kramdown
highlighter: rouge
future: true

# Kramdown 扩展（kramdown-mode 语法高亮选项）
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# 分类 & 标签 归档
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category_archive
    tag: tag_archive
  permalinks:
    category: /category/:name/
    tag: /tag/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true

# 社交
github_username: siminles

# 域名
url: "https://siminles.github.io"
baseurl: ""
