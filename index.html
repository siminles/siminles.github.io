---
layout: default
title: 首页
---

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">
      <h2>{{ post.title }}</h2>
      <span class="post-meta">{{ post.date | date: "%Y 年 %m 月 %d 日" }}</span>
      {% if post.excerpt %}
      <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
      {% endif %}
    </a>
  </li>
  {% endfor %}
</ul>
